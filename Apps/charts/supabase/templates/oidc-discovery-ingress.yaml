{{- if .Values.oidcDiscoveryIngress.enabled }}
# Bypasses Kong for the single OIDC discovery path so api-gateway/backend JWT
# validation can fetch openid-configuration -> jwks_uri. The upstream Kong
# config leaves this path behind key-auth (returns 401); nginx routes this more
# specific Exact path directly to GoTrue and rewrites it to the doc's real path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-oidc-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: oidc-discovery
  annotations:
    {{- toYaml .Values.oidcDiscoveryIngress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.oidcDiscoveryIngress.className }}
  rules:
    - host: {{ .Values.oidcDiscoveryIngress.host | quote }}
      http:
        paths:
          - path: /auth/v1/.well-known/openid-configuration
            pathType: Exact
            backend:
              service:
                name: {{ .Values.oidcDiscoveryIngress.authServiceName }}
                port:
                  number: {{ .Values.oidcDiscoveryIngress.authServicePort | int }}
{{- end }}
