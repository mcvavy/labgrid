{{- if .Values.externalSecrets.enabled }}
{{- $store := .Values.externalSecrets.secretStoreRef }}
{{- $refresh := .Values.externalSecrets.refreshInterval }}
{{- $ns := .Release.Namespace }}
{{- $chart := .Chart.Name }}
{{- $release := .Release.Name }}

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-jwt
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $chart | quote }}
    app.kubernetes.io/instance: {{ $release | quote }}
    app.kubernetes.io/component: supabase-jwt
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: supabase-jwt
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: labgrid-supabase-jwt-secret
    - secretKey: anonKey
      remoteRef:
        key: labgrid-supabase-jwt-anon-key
    - secretKey: serviceKey
      remoteRef:
        key: labgrid-supabase-jwt-service-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-db
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $chart | quote }}
    app.kubernetes.io/instance: {{ $release | quote }}
    app.kubernetes.io/component: supabase-db
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: supabase-db
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ `{{ .password }}` }}"
        database: postgres
        password_encoded: "{{ `{{ .password | urlquery }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: labgrid-supabase-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-smtp
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $chart | quote }}
    app.kubernetes.io/instance: {{ $release | quote }}
    app.kubernetes.io/component: supabase-smtp
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: supabase-smtp
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: acs-smtp-username
    - secretKey: password
      remoteRef:
        key: acs-smtp-password
---
apiVersion: external-secrets.io/v1
