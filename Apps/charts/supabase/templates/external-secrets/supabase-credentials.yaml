    app.kubernetes.io/name: {{ $chart | quote }}
    app.kubernetes.io/instance: {{ $release | quote }}
    app.kubernetes.io/component: supabase-dashboard
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store.name }}
    kind: {{ $store.kind }}
  target:
    name: supabase-dashboard
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .password }}` }}"
        openAiApiKey: ""
  data:
    - secretKey: username
      remoteRef:
        key: labgrid-supabase-dashboard-username
    - secretKey: password
      remoteRef:
        key: labgrid-supabase-dashboard-password
---
