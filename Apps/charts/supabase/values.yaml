# Labgrid Supabase wrapper — defaults shared by spike and production overrides.
# Subchart values are passed under the `supabase:` key.

externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: azure-kv-cluster-store
    kind: ClusterSecretStore

# Carve-out Ingress that exposes GoTrue's OIDC discovery document
# (/auth/v1/.well-known/openid-configuration) by routing that single path
# straight to the auth Service, bypassing Kong. The upstream chart's Kong
# config only opens jwks.json (not the discovery doc), and we keep the upstream
# chart unmodified — so this owned Ingress carves out just that one path.
# Required by api-gateway + backend JWT validation (OIDC discovery -> jwks_uri).
# nginx serves a more specific (Exact) path ahead of the chart's "/" -> Kong rule.
oidcDiscoveryIngress:
  enabled: true
  host: supabase.labgrid.net
  className: nginx
  authServiceName: supabase-supabase-auth
  authServicePort: 9999
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /.well-known/openid-configuration

# In-cluster static server that hosts the branded GoTrue email templates.
# GoTrue fetches each template over HTTP GET (it does not read mounted files),
# so the HTML lives in a ConfigMap served by nginx and reachable only inside
# the cluster at http://<name>/<template>.html. The matching auth env vars are
# under supabase.environment.auth below.
mailTemplates:
  enabled: true
  name: supabase-mail-templates
  replicaCount: 1
  runAsUser: 101
  containerPort: 8080
  serveRoot: /usr/share/nginx/html
  image:
    repository: nginxinc/nginx-unprivileged
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 64Mi

supabase:
  secret:
    jwt:
      secretRef: supabase-jwt
    # ES256 signing + JWKS for Auth / PostgREST / Realtime / Storage (see README).
    apikey:
      secretRef: supabase-apikey
    db:
      secretRef: supabase-db
      database: postgres
    # K8s secret supabase-smtp ← ESO syncs AKV acs-smtp-username / acs-smtp-password (shared with Chatwoot).
    smtp:
      secretRef: supabase-smtp
    dashboard:
      secretRef: supabase-dashboard
    analytics:
      secretRef: supabase-analytics
    realtime:
      secretRef: supabase-realtime
    meta:
      secretRef: supabase-meta
    minio:
      secretRef: supabase-minio
    s3:
      secretRef: supabase-s3

  deployment:
    vector:
      enabled: false
    minio:
      enabled: true
      # Chainguard MinIO (cgr.dev/chainguard/minio) runs as UID/GID 65532; Synology PVCs
      # mount as root:root without fsGroup, causing "file access denied" on /data.
      podSecurityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        runAsNonRoot: true
    studio:
      enabled: true

  environment:
    auth:
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: smtp.azurecomm.net
      GOTRUE_SMTP_PORT: "587"
      GOTRUE_SMTP_ADMIN_EMAIL: testing@tranzrmoves.com
      GOTRUE_SMTP_SENDER_NAME: Tranzzer Services
      # Branded email templates served by the in-cluster mailTemplates server.
      # URLs must match mailTemplates.name + the ConfigMap file keys (Go template
      # syntax {{ .Token }} / {{ .ConfirmationURL }} resolved by GoTrue at send time).
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: http://supabase-mail-templates/magic-link.html
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: http://supabase-mail-templates/confirmation.html
      GOTRUE_MAILER_TEMPLATES_RECOVERY: http://supabase-mail-templates/recovery.html
      GOTRUE_MAILER_TEMPLATES_INVITE: http://supabase-mail-templates/invite.html
      GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE: http://supabase-mail-templates/email-change.html
      GOTRUE_MAILER_TEMPLATES_REAUTHENTICATION: http://supabase-mail-templates/reauthentication.html
      GOTRUE_MAILER_SUBJECTS_MAGIC_LINK: Your Tranzzer Services sign-in code
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: Confirm your Tranzzer email
      GOTRUE_MAILER_SUBJECTS_RECOVERY: Reset your Tranzzer Services password
      GOTRUE_MAILER_SUBJECTS_INVITE: You've been invited to Tranzzer Services
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: Confirm your new Tranzzer Services email
      GOTRUE_MAILER_SUBJECTS_REAUTHENTICATION: Your Tranzzer Services verification code
    storage:
      GLOBAL_S3_BUCKET: supabase

  persistence:
    db:
      enabled: true
      storageClassName: synology-iscsi-delete
      size: 50Gi
    minio:
      enabled: true
      storageClassName: synology-iscsi-delete-wffc
      size: 20Gi
    storage:
      enabled: true
      storageClassName: synology-iscsi-delete-wffc
      size: 10Gi
