# Production monitoring stack for labgrid (Argo app: monitoring → namespace monitoring-system).
# Helm release name must be "monitoring" (ApplicationSet path basename).

monitoringCredentials:
  enabled: true
  name: monitoring-credentials
  refreshInterval: "1h"
  target: labgrid-monitoring-credentials
  secretStoreRef:
    name: azure-kv-cluster-store
    kind: ClusterSecretStore
  data:
    - secretKey: grafana-admin-password
      remoteRef:
        key: labgrid-grafana-admin-password
    - secretKey: grafana-admin-user
      remoteRef:
        key: labgrid-grafana-admin-user

# Opt-in Prometheus scraping (see README). Metrics from apps use OTLP → Alloy → remote_write.
prometheusScrape:
  label: prometheus-scrape
  value: "true"

# Alloy: skip infra namespaces; collect logs from deployed app namespaces only.
alloyLogs:
  namespaceDenylist:
    - kube-system
    - kube-public
    - kube-node-lease
    - monitoring-system
    - prometheus-system
    - argocd
    - cert-manager
    - external-secrets
    - metallb-system
    - ingress-nginx
    - synology-csi
    - traefik
    - cnpg-system
    - dapr-system

# Alloy pipeline endpoints (release name: monitoring, namespace: monitoring-system)
alloyEndpoints:
  clusterLabel: labgrid
  lokiPushUrl: http://monitoring-loki-gateway.monitoring-system.svc.cluster.local/loki/api/v1/push
  prometheusRemoteWriteUrl: http://kps-monitoring-prometheus.monitoring-system.svc.cluster.local:9090/api/v1/write
  tempoOtlpEndpoint: http://monitoring-tempo.monitoring-system.svc.cluster.local:4317

###############################
# kube-prometheus-stack (metrics + alerts; no Grafana pod)
# Cluster infra scraping disabled — app metrics via OTLP remote_write only.
###############################
kube-prometheus-stack:
  fullnameOverride: kps-monitoring

  grafana:
    enabled: false
    forceDeployDashboards: true

  kubeApiServer:
    enabled: false
  kubelet:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  kubeEtcd:
    enabled: false
  coreDns:
    enabled: false
  kubeStateMetrics:
    enabled: false
  nodeExporter:
    enabled: false

  defaultRules:
    create: true
    rules:
      alertmanager: true
      prometheus: true
      prometheusOperator: true
      general: true
      configReloaders: true
      kubePrometheusGeneral: true
      kubelet: false
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      kubeStateMetrics: false
      kubernetesApps: false
      kubernetesResources: false
      kubernetesStorage: false
      kubernetesSystem: false
      k8sContainerCpuUsageSecondsTotal: false
      k8sContainerMemoryCache: false
      k8sContainerMemoryRss: false
      k8sContainerMemorySwap: false
      k8sContainerResource: false
      k8sContainerMemoryWorkingSetBytes: false
      k8sPodOwner: false
      node: false
      nodeExporterAlerting: false
      nodeExporterRecording: false
      network: false
      etcd: false

  prometheus:
    serviceMonitor:
      selfMonitor: false
    prometheusSpec:
      replicas: 1
      retention: 7d
      retentionSize: 45GiB
      scrapeInterval: 60s
      evaluationInterval: 60s
      enableRemoteWriteReceiver: true
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          prometheus-scrape: "true"
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector:
        matchLabels:
          prometheus-scrape: "true"
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          release: monitoring
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
      # Allow long WAL replay after storage recovery (operator merges by container name).
      containers:
        - name: prometheus
          startupProbe:
            failureThreshold: 120
            periodSeconds: 15
            timeoutSeconds: 5
            httpGet:
              path: /-/ready
              port: http-web
              scheme: HTTP
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: synology-iscsi-delete-wffc
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 80Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - prometheus.labgrid.net
      paths:
        - /
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        nginx.ingress.kubernetes.io/backend-protocol: HTTP
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  alertmanager:
    serviceMonitor:
      selfMonitor: false
    alertmanagerSpec:
      replicas: 1
      retention: 120h
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - alertmanager.labgrid.net
      paths:
        - /
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        nginx.ingress.kubernetes.io/backend-protocol: HTTP
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  prometheusOperator:
    serviceMonitor:
      selfMonitor: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

###############################
# Standalone Grafana
###############################
grafana:
  replicas: 1
  admin:
    existingSecret: labgrid-monitoring-credentials
    userKey: grafana-admin-user
    passwordKey: grafana-admin-password

  persistence:
    enabled: true
    type: pvc
    storageClassName: synology-iscsi-delete-wffc
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.labgrid.net
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: false

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          isDefault: true
          url: http://kps-monitoring-prometheus.monitoring-system.svc.cluster.local:9090
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://monitoring-loki-gateway.monitoring-system.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: fake
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://monitoring-tempo.monitoring-system.svc.cluster.local:3200
          jsonData:
            httpMethod: GET
            tracesToLogs:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true

###############################
# Loki
###############################
loki:
  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    persistence:
      enabled: true
      storageClass: synology-iscsi-delete-wffc
      accessModes:
        - ReadWriteOnce
      size: 50Gi

  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  test:
    enabled: false

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    limits_config:
      retention_period: 168h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      per_stream_rate_limit: 5MB
      per_stream_rate_limit_burst: 15MB
    storage:
      type: filesystem
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

###############################
# Tempo
###############################
tempo:
  fullnameOverride: monitoring-tempo

  tempo:
    retention: 168h
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

  persistence:
    enabled: true
    storageClassName: synology-iscsi-delete-wffc
    accessModes:
      - ReadWriteOnce
    size: 30Gi

  serviceMonitor:
    enabled: false

###############################
# Grafana Alloy
###############################
alloy:
  enabled: true

  controller:
    type: daemonset

  alloy:
    configMap:
      create: false
      name: monitoring-alloy
      key: config.alloy
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  serviceMonitor:
    enabled: false
