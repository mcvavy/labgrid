{{- if .Values.monitoringCredentials.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.monitoringCredentials.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: {{ .Values.monitoringCredentials.name | quote }}
    app.kubernetes.io/name: {{ include "monitoring-stack.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
spec:
  refreshInterval: {{ .Values.monitoringCredentials.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.monitoringCredentials.secretStoreRef.name }}
    kind: {{ .Values.monitoringCredentials.secretStoreRef.kind }}
  target:
    name: {{ .Values.monitoringCredentials.target }}
    creationPolicy: Owner
  data:
{{- range $item := .Values.monitoringCredentials.data }}
    - secretKey: {{ $item.secretKey }}
      remoteRef:
        key: {{ $item.remoteRef.key }}
{{- end }}
{{- end }}
