apiVersion: v2
name: monitoring-stack
description: >
  Throwaway LGTM+P spike chart (standalone Grafana, kube-prometheus-stack without Grafana,
  Loki, Tempo, Alloy). Install manually into monitoring-spike — not managed by Argo Apps/charts/*.
type: application
version: 0.1.0
appVersion: "1.0.0"
maintainers:
  - name: LabGrid Labs

dependencies:
  - name: kube-prometheus-stack
    version: 80.11.0
    repository: https://prometheus-community.github.io/helm-charts
  - name: grafana
    version: 10.5.15
    repository: https://grafana.github.io/helm-charts
  - name: loki
    version: 6.49.0
    repository: https://grafana.github.io/helm-charts
  - name: tempo
    version: 1.24.4
    repository: https://grafana.github.io/helm-charts
  - name: alloy
    version: 1.5.1
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
